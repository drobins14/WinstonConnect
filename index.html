<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Winston County E911 Connect</title>
<style>
:root{--navy:#071426;--panel:#111d2e;--panel2:#18263a;--gold:#d6a84f;--red:#d64242;--text:#f7fafc;--muted:#9aa8bc;--line:#2b3b54;--orange:#ffb020;--cyan:#00f0ff;--green:#22c55e;--purple:#a78bfa}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--navy);color:var(--text)}button,input,select,textarea{font:inherit}button{cursor:pointer;border:0;border-radius:10px;padding:10px 14px;background:var(--gold);color:#071426;font-weight:700}button.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}button.danger{background:var(--red);color:#fff}input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:#0b1728;color:var(--text)}label{display:block;margin:10px 0 5px;color:var(--muted);font-size:13px}.wrap{max-width:1220px;margin:auto;padding:14px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 10px 30px #0003}.login{min-height:100vh;display:grid;place-items:center;padding:20px}.login .card{max-width:430px;width:100%;text-align:center}.logo{width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);background:#fff;margin:auto;display:block}.top{display:flex;align-items:center;gap:12px;justify-content:space-between;position:sticky;top:0;background:linear-gradient(180deg,var(--navy),#071426dd);z-index:5;padding:10px 14px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:10px;font-weight:800}.brand img{width:42px;height:42px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;background:#fff}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}.tab{background:var(--panel2);color:var(--text);border:1px solid var(--line)}.tab.active{background:var(--gold);color:#071426}.grid{display:grid;gap:14px}.cols2{grid-template-columns:repeat(2,minmax(0,1fr))}.cols3{grid-template-columns:repeat(3,minmax(0,1fr))}.cols4{grid-template-columns:repeat(4,minmax(0,1fr))}@media(max-width:800px){.cols2,.cols3,.cols4{grid-template-columns:1fr}.top{align-items:flex-start}.hideMobile{display:none}}table{width:100%;border-collapse:collapse;overflow:auto}th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top}th{color:var(--gold);font-size:12px;text-transform:uppercase}.muted{color:var(--muted)}.pill{display:inline-flex;gap:6px;align-items:center;border-radius:999px;padding:5px 9px;font-size:12px;background:var(--panel2);border:1px solid var(--line)}.shift{border-left:6px solid var(--gold);padding:8px;border-radius:10px;background:#0b1728;margin:3px 0}.openDay{border-color:var(--orange)}.openNight{border-color:var(--cyan)}.day{border-color:#facc15}.night{border-color:#8b5cf6}.vac{border-color:#60a5fa}.sick{border-color:#ef4444}.train{border-color:var(--green)}.right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.total{font-size:24px;font-weight:900;color:var(--gold)}.notice{border:1px solid var(--gold);background:#221b0a;border-radius:14px;padding:12px}@media print{body{background:#fff;color:#000}.top,.tabs,.noPrint,button{display:none!important}.card{box-shadow:none;border:1px solid #ccc;color:#000;background:#fff}input,select,textarea{border:0;color:#000;background:#fff;padding:0}th{color:#000}.muted{color:#444}}
</style>
</head>
<body><div id="app"></div>
<script>
const BADGE="";
const LS="wc911_connect_v1";
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>Math.random().toString(36).slice(2,9);
const def={org:{name:"Winston County E911 Connect",subtitle:"Scheduling • Communication • Payroll • Operations",payrollEmail:"",payPeriodStart:today()},session:null,users:[{id:"admin",first:"System",last:"Administrator",username:"admin",password:"Admin@911",role:"Admin",shift:"Admin",status:"Active",mustReset:true,profileComplete:true,email:"",phone:"",color:"#d6a84f",notify:{app:true,email:false,sms:false}}],shifts:[{id:uid(),date:today(),employee:"OPEN DAY SHIFT",code:"Open Day",start:"07:00",end:"19:00",type:"openDay",notes:"Needs coverage"},{id:uid(),date:today(),employee:"OPEN NIGHT SHIFT",code:"Open Night",start:"19:00",end:"07:00",type:"openNight",notes:"Needs coverage"}],trainees:[],timecards:[],notifications:[],colors:{openDay:"#ffb020",openNight:"#00f0ff",day:"#facc15",night:"#8b5cf6",vac:"#60a5fa",sick:"#ef4444",train:"#22c55e"}};
let db=load();let route=localStorage.route||"dashboard";
function load(){try{return JSON.parse(localStorage.getItem(LS))||def}catch{return def}}
function save(){localStorage.setItem(LS,JSON.stringify(db))}
function current(){return db.users.find(u=>u.id===db.session)}
function isAdmin(){return current()&&current().role==="Admin"}
function isSup(){return current()&&["Admin","Supervisor"].includes(current().role)}
function note(title,msg,to="all"){db.notifications.unshift({id:uid(),title,msg,to,date:new Date().toLocaleString(),read:false});save()}
function app(){document.getElementById("app").innerHTML=db.session?main():login();bind()}
function login(){return `<div class="login"><div class="card"><img class="logo" src="${BADGE||'https://dummyimage.com/200x200/d6a84f/071426&text=911'}"><h1>Winston County<br>E911 Connect</h1><p class="muted">Communications Operations Management System</p><div id="err" class="muted"></div><label>Username</label><input id="lu" autocomplete="username"><label>Password</label><input id="lp" type="password"><p><button id="loginBtn">Sign In</button></p><p class="muted">Initial admin: admin / Admin@911</p></div></div>`}
function main(){let u=current();if(u.mustReset)return shell("Initial Setup",resetView());if(!u.profileComplete)return shell("Complete Profile",profileView(true));return shell("",routeView())}
function shell(title,content){let u=current();let tabs=["dashboard","schedule","timecards","payroll","trainees","notifications","profile"].concat(isAdmin()?["admin"]:[]);return `<div class="top"><div class="brand"><img src="${BADGE||'https://dummyimage.com/80x80/d6a84f/071426&text=911'}"><div>Winston County E911 Connect<div class="muted" style="font-size:12px">${db.org.subtitle}</div></div></div><div class="right"><span class="pill">${u.first} ${u.last} • ${u.role}</span><button class="secondary" id="logout">Logout</button></div></div><div class="wrap"><div class="tabs noPrint">${tabs.map(t=>`<button class="tab ${route===t?'active':''}" data-route="${t}">${t[0].toUpperCase()+t.slice(1)}</button>`).join("")}</div>${title?`<h2>${title}</h2>`:""}${content}</div>`}
function routeView(){return ({dashboard,schedule,timecards,payroll,trainees,notifications,profile:()=>profileView(false),admin}[route]||dashboard)()}
function dashboard(){let u=current(),mine=db.timecards.filter(t=>t.userId===u.id),pending=db.timecards.filter(t=>t.status==="Submitted").length;return `<div class="grid cols3"><div class="card"><h2>Welcome, ${u.first}</h2><p class="muted">Default night mode enabled.</p><p><span class="pill">Shift: ${u.shift}</span></p></div><div class="card"><h3>Current Pay Period</h3><div class="total">${db.org.payPeriodStart}</div><p class="muted">Over 80 worked hours = overtime.</p></div><div class="card"><h3>Pending Approvals</h3><div class="total">${isSup()?pending:mine.filter(t=>t.status==="Submitted").length}</div><p class="muted">Submitted time cards awaiting review.</p></div></div><div class="card" style="margin-top:14px"><h3>Today's Schedule</h3>${scheduleTable(today(),today(),true)}</div>`}
function schedule(){return `<div class="card"><div class="right noPrint"><input id="sf" type="date" value="${today()}"><input id="st" type="date" value="${today()}">${isSup()?'<button id="addShift">Add Shift</button>':''}</div><h2>Master Schedule</h2><p class="muted">Everyone sees the same master schedule. Only supervisors/admins edit it.</p><div id="schedOut">${scheduleTable()}</div></div>`}
function scheduleTable(from=today(),to=today(),small=false){let rows=db.shifts.filter(s=>s.date>=from&&s.date<=to).sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start));return `<table><thead><tr><th>Date</th><th>Employee</th><th>Shift</th><th>Time</th><th>Notes</th>${isSup()&&!small?'<th></th>':''}</tr></thead><tbody>${rows.map(s=>`<tr><td>${s.date}</td><td>${s.employee}</td><td><div class="shift ${s.type}" style="border-color:${db.colors[s.type]||'#d6a84f'}">${s.code}</div></td><td>${s.start} - ${s.end}</td><td>${s.notes||""}</td>${isSup()&&!small?`<td><button class="secondary editShift" data-id="${s.id}">Edit</button> <button class="danger delShift" data-id="${s.id}">Delete</button></td>`:""}</tr>`).join("")||"<tr><td colspan=6>No schedule entries.</td></tr>"}</tbody></table>${!small?`<h3>Trainees</h3>${traineeMini()}`:""}`}
function timecards(){let u=current(),users=isSup()?db.users.filter(x=>x.status==="Active"):[u];return `<div class="card"><h2>Time Cards</h2><p class="muted">No clock in/out. Enter hours manually and submit.</p><div class="right noPrint"><select id="tcUser">${users.map(x=>`<option value="${x.id}">${x.first} ${x.last}</option>`).join("")}</select><input id="tcStart" type="date" value="${db.org.payPeriodStart}"><input id="tcEnd" type="date" value="${today()}"><button id="newTC">Open / Create</button></div><div id="tcOut">${timecardEditor(u.id,db.org.payPeriodStart,today())}</div></div>`}
function getTC(userId,start,end){let t=db.timecards.find(x=>x.userId===userId&&x.start===start&&x.end===end);if(!t){t={id:uid(),userId,start,end,status:"Draft",rows:[]};let d=new Date(start),e=new Date(end);while(d<=e){t.rows.push({date:d.toISOString().slice(0,10),regular:0,overtime:0,holiday:0,holidayWorked:0,vacation:0,sick:0,admin:0,training:0,notes:""});d.setDate(d.getDate()+1)}db.timecards.push(t);save()}return t}
function timecardEditor(userId,start,end){let t=getTC(userId,start,end),u=db.users.find(x=>x.id===userId),ro=t.status==="Approved"||(!isSup()&&t.userId!==current().id),totals=calc(t);return `<h3>${u.first} ${u.last} • ${start} to ${end}</h3><table><thead><tr><th>Date</th><th>Reg</th><th>OT</th><th>Holiday</th><th>Holiday Worked</th><th>Vacation</th><th>Sick</th><th>Admin</th><th>Training</th><th>Notes</th></tr></thead><tbody>${t.rows.map((r,i)=>`<tr><td>${r.date}</td>${["regular","overtime","holiday","holidayWorked","vacation","sick","admin","training"].map(k=>`<td><input ${ro?'disabled':''} class="tcnum" data-t="${t.id}" data-i="${i}" data-k="${k}" type="number" step=".25" value="${r[k]}"></td>`).join("")}<td><input ${ro?'disabled':''} class="tcnote" data-t="${t.id}" data-i="${i}" value="${r.notes||""}"></td></tr>`).join("")}</tbody></table><div class="grid cols4" style="margin-top:12px">${Object.entries(totals).map(([k,v])=>`<div class="card"><b>${k}</b><div class="total">${v}</div></div>`).join("")}</div><p>Status: <span class="pill">${t.status}</span></p><div class="right noPrint">${!ro?`<button class="submitTC" data-id="${t.id}">Submit Time Card</button>`:""}${isSup()&&t.status==="Submitted"?`<button class="approveTC" data-id="${t.id}">Approve</button><button class="danger returnTC" data-id="${t.id}">Return</button>`:""}</div>`}
function calc(t){let worked=0,leave={Holiday:0,Vacation:0,Sick:0,Admin:0,Training:0};t.rows.forEach(r=>{worked+=+r.regular + +r.overtime + +r.holidayWorked;leave.Holiday+=+r.holiday;leave.Vacation+=+r.vacation;leave.Sick+=+r.sick;leave.Admin+=+r.admin;leave.Training+=+r.training});return {Regular:Math.min(worked,80),Overtime:Math.max(worked-80,0),Worked:worked,...leave,Total:worked+Object.values(leave).reduce((a,b)=>a+b,0)}}
function payroll(){return `<div class="card"><h2>Payroll Builder</h2><p class="muted">Anything over 80 worked hours is overtime.</p><div class="right noPrint"><input id="payStart" type="date" value="${db.org.payPeriodStart}"><input id="payEnd" type="date" value="${today()}"><button id="buildPay">Build Payroll</button><button onclick="print()">Print / Save PDF</button></div><div id="payOut">${payrollTable(db.org.payPeriodStart,today())}</div></div>`}
function payrollTable(start,end){let rows=db.timecards.filter(t=>t.start===start&&t.end===end&&t.status==="Approved");return `<h3>Payroll Summary ${start} to ${end}</h3><table><thead><tr><th>Employee</th><th>Regular</th><th>Overtime</th><th>Holiday</th><th>Vacation</th><th>Sick</th><th>Admin</th><th>Training</th><th>Total</th></tr></thead><tbody>${rows.map(t=>{let u=db.users.find(x=>x.id===t.userId),c=calc(t);return `<tr><td>${u?u.first+" "+u.last:"Unknown"}</td><td>${c.Regular}</td><td>${c.Overtime}</td><td>${c.Holiday}</td><td>${c.Vacation}</td><td>${c.Sick}</td><td>${c.Admin}</td><td>${c.Training}</td><td>${c.Total}</td></tr>`}).join("")||"<tr><td colspan=9>No approved time cards for this pay period.</td></tr>"}</tbody></table>`}
function trainees(){return `<div class="card"><h2>Trainees</h2>${isSup()?'<button id="addTrainee">Add Trainee Entry</button>':''}<div style="margin-top:10px">${traineeMini(true)}</div></div>`}
function traineeMini(full=false){return `<table><thead><tr><th>Name</th><th>Trainer</th><th>Date</th><th>Hours</th><th>Status</th><th>Notes</th>${isSup()&&full?'<th></th>':''}</tr></thead><tbody>${db.trainees.map(t=>`<tr><td>${t.name}</td><td>${t.trainer}</td><td>${t.date}</td><td>${t.hours}</td><td>${t.status}</td><td>${t.notes||""}</td>${isSup()&&full?`<td><button class="danger delTrain" data-id="${t.id}">Delete</button></td>`:""}</tr>`).join("")||"<tr><td colspan=7>No trainee entries.</td></tr>"}</tbody></table>`}
function notifications(){let u=current(),rows=db.notifications.filter(n=>n.to==="all"||n.to===u.id);return `<div class="card"><h2>Notifications</h2>${isSup()?'<div class="right noPrint"><input id="ann" placeholder="Announcement"><button id="sendAnn">Post</button></div>':''}<table><thead><tr><th>Date</th><th>Title</th><th>Message</th></tr></thead><tbody>${rows.map(n=>`<tr><td>${n.date}</td><td>${n.title}</td><td>${n.msg}</td></tr>`).join("")||"<tr><td colspan=3>No notifications.</td></tr>"}</tbody></table></div>`}
function profileView(force){let u=current();return `<div class="card"><h2>${force?"Required Profile Setup":"Profile"}</h2>${force?'<div class="notice">Before continuing, please update your employee profile.</div>':""}<label>Email</label><input id="pemail" value="${u.email||""}"><label>Phone</label><input id="pphone" value="${u.phone||""}"><label>Preferred Accent Color</label><input id="pcolor" type="color" value="${u.color||"#d6a84f"}"><h3>Notifications</h3><label><input id="napp" type="checkbox" ${u.notify?.app?'checked':''}> In-app</label><label><input id="nemail" type="checkbox" ${u.notify?.email?'checked':''}> Email</label><label><input id="nsms" type="checkbox" ${u.notify?.sms?'checked':''}> SMS/Text</label><p><button id="saveProfile">Save Profile</button></p></div>`}
function resetView(){return `<div class="card"><h2>Password Reset Required</h2><p class="muted">You must change your temporary password before using the app.</p><label>New Password</label><input id="np1" type="password"><label>Confirm Password</label><input id="np2" type="password"><p><button id="savePass">Update Password</button></p></div>`}
function admin(){return `<div class="grid cols2"><div class="card"><h2>Users</h2><button id="addUser">Add User</button><table><thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Shift</th><th>Status</th><th></th></tr></thead><tbody>${db.users.map(u=>`<tr><td>${u.first} ${u.last}</td><td>${u.username}</td><td>${u.role}</td><td>${u.shift}</td><td>${u.status}</td><td><button class="secondary editUser" data-id="${u.id}">Edit</button> <button class="danger deactUser" data-id="${u.id}">${u.status==="Active"?"Deactivate":"Activate"}</button></td></tr>`).join("")}</tbody></table></div><div class="card"><h2>Settings</h2><label>Payroll Email</label><input id="setEmail" value="${db.org.payrollEmail||""}"><label>Pay Period Start</label><input id="setStart" type="date" value="${db.org.payPeriodStart}"><button id="saveSettings">Save Settings</button><hr><button class="secondary" id="exportData">Export Backup</button><button class="danger" id="resetDemo">Factory Reset</button></div></div>`}
function bind(){let $=id=>document.getElementById(id);document.querySelectorAll("[data-route]").forEach(b=>b.onclick=()=>{route=b.dataset.route;localStorage.route=route;app()});if($("loginBtn"))$("loginBtn").onclick=()=>{let u=db.users.find(x=>x.username.toLowerCase()==$("lu").value.toLowerCase()&&x.password===$("lp").value&&x.status==="Active");if(!u){$("err").textContent="Invalid login.";return}db.session=u.id;save();app()};if($("logout"))$("logout").onclick=()=>{db.session=null;save();app()};if($("savePass"))$("savePass").onclick=()=>{let u=current();if($("np1").value.length<8||$("np1").value!==$("np2").value||$("np1").value===u.username){alert("Password must be 8+ characters, match, and not equal username.");return}u.password=$("np1").value;u.mustReset=false;save();app()};if($("saveProfile"))$("saveProfile").onclick=()=>{let u=current();u.email=$("pemail").value;u.phone=$("pphone").value;u.color=$("pcolor").value;u.notify={app:$("napp").checked,email:$("nemail").checked,sms:$("nsms").checked};if(!u.email||!u.phone){alert("Email and phone are required.");return}u.profileComplete=true;save();app()};if($("addUser"))$("addUser").onclick=()=>{let first=prompt("First name?"),last=prompt("Last name?");if(!first||!last)return;let role=prompt("Role: Employee, Supervisor, Admin","Employee")||"Employee",shift=prompt("Shift/group","Day")||"";let username=(first[0]+last).replace(/\s/g,"");db.users.push({id:uid(),first,last,username,password:username,role,shift,status:"Active",mustReset:true,profileComplete:false,email:"",phone:"",color:"#d6a84f",notify:{app:true,email:false,sms:false}});note("User Created",`${first} ${last} was added.`);save();app()};document.querySelectorAll(".deactUser").forEach(b=>b.onclick=()=>{let u=db.users.find(x=>x.id===b.dataset.id);u.status=u.status==="Active"?"Inactive":"Active";save();app()});document.querySelectorAll(".editUser").forEach(b=>b.onclick=()=>{let u=db.users.find(x=>x.id===b.dataset.id);u.role=prompt("Role",u.role)||u.role;u.shift=prompt("Shift/group",u.shift)||u.shift;save();app()});if($("saveSettings"))$("saveSettings").onclick=()=>{db.org.payrollEmail=$("setEmail").value;db.org.payPeriodStart=$("setStart").value;save();app()};if($("exportData"))$("exportData").onclick=()=>{let blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="wc911-connect-backup.json";a.click()};if($("resetDemo"))$("resetDemo").onclick=()=>{if(confirm("Erase all local data?")){localStorage.removeItem(LS);db=load();app()}};if($("addShift"))$("addShift").onclick=()=>{let date=prompt("Date YYYY-MM-DD",today()),employee=prompt("Employee or OPEN DAY/NIGHT","OPEN DAY SHIFT"),code=prompt("Shift code","Open Day"),start=prompt("Start","07:00"),end=prompt("End","19:00"),type=prompt("Type: openDay, openNight, day, night, vac, sick, train","openDay"),notes=prompt("Notes","");db.shifts.push({id:uid(),date,employee,code,start,end,type,notes});note("Schedule Posted",`${employee} ${code} on ${date}`);save();app()};document.querySelectorAll(".delShift").forEach(b=>b.onclick=()=>{db.shifts=db.shifts.filter(x=>x.id!==b.dataset.id);save();app()});document.querySelectorAll(".editShift").forEach(b=>b.onclick=()=>{let s=db.shifts.find(x=>x.id===b.dataset.id);s.employee=prompt("Employee",s.employee)||s.employee;s.code=prompt("Code",s.code)||s.code;s.notes=prompt("Notes",s.notes)||s.notes;save();app()});if($("sf"))$("sf").onchange=$("st").onchange=()=>{$("schedOut").innerHTML=scheduleTable($("sf").value,$("st").value)};if($("newTC"))$("newTC").onclick=()=>{$("tcOut").innerHTML=timecardEditor($("tcUser").value,$("tcStart").value,$("tcEnd").value);bind()};document.querySelectorAll(".tcnum").forEach(i=>i.oninput=()=>{let t=db.timecards.find(x=>x.id===i.dataset.t);t.rows[i.dataset.i][i.dataset.k]=parseFloat(i.value)||0;save()});document.querySelectorAll(".tcnote").forEach(i=>i.oninput=()=>{let t=db.timecards.find(x=>x.id===i.dataset.t);t.rows[i.dataset.i].notes=i.value;save()});document.querySelectorAll(".submitTC").forEach(b=>b.onclick=()=>{let t=db.timecards.find(x=>x.id===b.dataset.id);t.status="Submitted";note("Time Card Submitted","A time card is ready for approval.");save();app()});document.querySelectorAll(".approveTC").forEach(b=>b.onclick=()=>{let t=db.timecards.find(x=>x.id===b.dataset.id);t.status="Approved";note("Time Card Approved","Your time card was approved.",t.userId);save();app()});document.querySelectorAll(".returnTC").forEach(b=>b.onclick=()=>{let t=db.timecards.find(x=>x.id===b.dataset.id);t.status="Returned";note("Time Card Returned","Your time card needs correction.",t.userId);save();app()});if($("buildPay"))$("buildPay").onclick=()=>{$("payOut").innerHTML=payrollTable($("payStart").value,$("payEnd").value)};if($("addTrainee"))$("addTrainee").onclick=()=>{db.trainees.push({id:uid(),name:prompt("Trainee name",""),trainer:prompt("Trainer",""),date:prompt("Date",today()),hours:parseFloat(prompt("Hours","0"))||0,status:prompt("Status","Training"),notes:prompt("Notes","")});save();app()};document.querySelectorAll(".delTrain").forEach(b=>b.onclick=()=>{db.trainees=db.trainees.filter(x=>x.id!==b.dataset.id);save();app()});if($("sendAnn"))$("sendAnn").onclick=()=>{if($("ann").value)note("Announcement",$("ann").value);app()}}
app();
</script></body></html>
